<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — HealthVet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg:#0b1020; --panel:#121a2e; --line:#22304d; --txt:#e8eefc; --muted:#92a0bd; --accent:#3b82f6; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,system-ui,sans-serif;
               background: radial-gradient(1200px 600px at 50% -10%, #16223f 0%, var(--bg) 60%); color:var(--txt); }
        .card { width:min(92vw,420px); background:var(--panel); border:1px solid var(--line); border-radius:18px;
                padding:40px 34px; box-shadow:0 30px 80px rgba(0,0,0,.5); text-align:center; }
        .brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:18px; }
        .brand i { color:var(--accent); font-size:26px; }
        .brand span { font-family:Outfit,sans-serif; font-weight:800; font-size:22px; letter-spacing:.3px; }
        h1 { font-family:Outfit,sans-serif; font-size:20px; margin:6px 0 6px; }
        p { color:var(--muted); font-size:14px; margin:0 0 26px; line-height:1.5; }
        .gbtn { display:inline-flex; align-items:center; gap:12px; width:100%; justify-content:center;
                background:#fff; color:#1f2937; border:none; border-radius:12px; padding:13px 18px; font-size:15px;
                font-weight:600; cursor:pointer; text-decoration:none; transition:transform .08s ease, box-shadow .2s; }
        .gbtn:hover { transform:translateY(-1px); box-shadow:0 10px 30px rgba(0,0,0,.35); }
        .gicon { width:20px; height:20px; }
        .foot { margin-top:22px; color:var(--muted); font-size:12px; }
        .err { color:#fca5a5; font-size:13px; margin-bottom:14px; min-height:18px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand"><i class="fa-solid fa-shield-halved"></i><span>HealthVet</span></div>
        <h1>Vendor Intelligence Platform</h1>
        <p>Sign in with your Google account to access the dashboard.</p>
        <div class="err" id="err"></div>
        <a class="gbtn" id="google-btn" href="#">
            <img class="gicon" alt="" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
            Continue with Google
        </a>
        <div class="foot">Authorized hospital staff only.</div>
    </div>

    <script src="env.js"></script>
    <script>
        // Wire the Google button to the backend OAuth start endpoint.
        const base = window.API_BASE || "";
        document.getElementById('google-btn').href = base + "/auth/google";
        // Surface any ?error=... from a failed callback redirect.
        const err = new URLSearchParams(location.search).get('error');
        if (err) document.getElementById('err').textContent = decodeURIComponent(err);
        // If already signed in, bounce to the app.
        fetch(base + "/api/me", { credentials: "include" })
            .then(r => r.json())
            .then(me => { if (me.authenticated) location.href = "index.html"; })
            .catch(() => {});
    </script>
</body>
</html>
