<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in HealthVet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bone:#F4EFE6; --paper:#FBF8F2; --line:#E3DCCF; --ink:#2B2230; --muted:#6B6470; --sage:#6E8F6B; --terra:#C77B57; --aub:#5A4A63; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,system-ui,sans-serif;
               background: radial-gradient(1100px 520px at 50% -8%, #FBF8F2 0%, var(--bone) 60%); color:var(--ink); }
        .card { width:min(92vw,430px); background:var(--paper); border:1px solid var(--line); border-radius:18px;
                padding:42px 36px; box-shadow:0 18px 50px rgba(43,34,48,.10); text-align:center; }
        .brand { display:flex; align-items:center; justify-content:center; gap:11px; margin-bottom:20px; }
        .brand .wm { font-family:'Spectral',serif; font-weight:600; font-size:24px; }
        .brand .wm b { font-weight:700; }
        h1 { font-family:'Spectral',serif; font-weight:600; font-size:21px; margin:6px 0 6px; }
        p { color:var(--muted); font-size:14px; margin:0 0 26px; line-height:1.55; }
        .gbtn { display:inline-flex; align-items:center; gap:12px; width:100%; justify-content:center;
                background:var(--ink); color:var(--bone); border:none; border-radius:12px; padding:14px 18px; font-size:15px;
                font-weight:600; cursor:pointer; text-decoration:none; transition:transform .08s ease, box-shadow .2s; font-family:Inter,sans-serif; }
        .gbtn:hover { transform:translateY(-1px); box-shadow:0 12px 30px rgba(43,34,48,.22); }
        .gicon { width:20px; height:20px; background:#fff; border-radius:4px; padding:2px; }
        .foot { margin-top:24px; color:var(--muted); font-size:12px; letter-spacing:.03em; }
        .err { color:#A9472F; font-size:13px; margin-bottom:14px; min-height:18px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <svg width="40" height="40" viewBox="0 0 72 72" fill="none" aria-label="HealthVet">
              <line x1="15" y1="36" x2="31" y2="53" stroke="#2B2230" stroke-width="13" stroke-linecap="round"/>
              <line x1="31" y1="53" x2="43.5" y2="34.5" stroke="#6E8F6B" stroke-width="13" stroke-linecap="round"/>
              <line x1="43.5" y1="34.5" x2="56" y2="16" stroke="#C77B57" stroke-width="13" stroke-linecap="round"/>
            </svg>
            <span class="wm">Health<b>Vet</b></span>
        </div>
        <h1>Vendor Trust Platform</h1>
        <p>Sign in with your Google account to access the dashboard.</p>
        <div class="err" id="err"></div>
        <a class="gbtn" id="google-btn" href="#">
            <img class="gicon" alt="" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
            Continue with Google
        </a>
        <div class="foot">Authorized hospital staff only.</div>
    </div>

    <script src="env.js"></script>
    <script>
        const base = window.API_BASE || "";
        document.getElementById('google-btn').href = base + "/auth/google";
        const err = new URLSearchParams(location.search).get('error');
        if (err) document.getElementById('err').textContent = decodeURIComponent(err);
        fetch(base + "/api/me", { credentials: "include" })
            .then(r => r.json())
            .then(me => { if (me.authenticated) location.href = "index.html"; })
            .catch(() => {});
    </script>
</body>
</html>
